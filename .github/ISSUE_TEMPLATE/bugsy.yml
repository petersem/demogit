name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: contact
    attributes:
      label: Contact Details
      placeholder: email@example.com

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the issue
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: Version
      options:
        - 1.0.2
        - 1.0.3
    validations:
      required: true